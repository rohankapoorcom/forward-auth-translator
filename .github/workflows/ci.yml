name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Unit tests with coverage
        run: |
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tee coverage.txt
          go test -race -cover ./internal/proxy/... | tee proxy-cover.txt
          pct=$(grep 'coverage:' proxy-cover.txt | awk '{gsub(/%/,"",$5); print $5}')
          awk -v p="$pct" 'BEGIN { if (p+0 < 80) { print "internal/proxy coverage below 80%:", p; exit 1 } }'

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

      - name: gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks detect --source . --redact --verbose
